    <main class="main">
      <div class="index-header">
        <div class="index-header-left">
          <h1>Tarefas</h1>
          <p>Organize seu dia e conquiste objetivos!</p>
        </div>
        <div class="index-header-right">
          <div class="index-stats-card">
            <div class="index-stats-item">
              <div class="index-stats-icon fire">🔥</div>
              <div class="index-stats-conteudo">
                <span>Sequência</span>
                <strong>17 dias</strong>
              </div>
            </div>

            <div class="stats-divider"></div>

            <div class="index-stats-item">
              <div class="index-stats-icon star">⭐</div>
              <div class="index-stats-conteudo">
                <span>Tarefas concluídas</span>
                <strong>23</strong>
              </div>
            </div>
          </div>

          <button class="index-header-add"><span>+</span> Nova tarefa</button>
        </div>
      </div>

      <div class="index-body">
        <div class="index-tarefas">
          <div class="index-tarefas-header">
            <button class="tarefas-card tarefas-card-active1">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                class="bi bi-list"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m-3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2"
                />
                <span>Todas</span>
              </svg>
            </button>

            <button class="tarefas-card">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                class="bi bi-amp"
                viewBox="0 0 16 16"
              >
                <path
                  d="M2.5 15a.5.5 0 1 1 0-1h1v-1a4.5 4.5 0 0 1 2.557-4.06c.29-.139.443-.377.443-.59v-.7c0-.213-.154-.451-.443-.59A4.5 4.5 0 0 1 3.5 3V2h-1a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-1v1a4.5 4.5 0 0 1-2.557 4.06c-.29.139-.443.377-.443.59v.7c0 .213.154.451.443.59A4.5 4.5 0 0 1 12.5 13v1h1a.5.5 0 0 1 0 1zm2-13v1c0 .537.12 1.045.337 1.5h6.326c.216-.455.337-.963.337-1.5V2zm3 6.35c0 .701-.478 1.236-1.011 1.492A3.5 3.5 0 0 0 4.5 13s.866-1.299 3-1.48zm1 0v3.17c2.134.181 3 1.48 3 1.48a3.5 3.5 0 0 0-1.989-3.158C8.978 9.586 8.5 9.052 8.5 8.351z"
                />

              <span>Pendentes</span>
              <span class="tarefas-notificacao">3</span>
            </button>

            <button class="tarefas-card">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                class="bi bi-play"
                viewBox="0 0 16 16"

                  d="M10.804 8 5 4.633v6.734zm.792-.696a.802.802 0 0 1 0 1.392l-6.363 3.692C4.713 12.69 4 12.345 4 11.692V4.308c0-.653.713-.998 1.233-.696z"
                />

              <span>Pendentes</span>
              <span class="tarefas-notificacao">3</span>
            </button>

            <button class="tarefas-card">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="currentColor"
                class="bi bi-check"
                viewBox="0 0 16 16"

                  d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"

              <span class="tarefas-notificacao">3</span>

          <div class="index-tarefas-conteudo"></div>
        </div>

        <div class="index-tarefas-status"></div>
